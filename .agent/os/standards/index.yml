# Agent-OS Standards Index
# Declarative conventions for Moqui Framework development
# Use with inject-standards skill: /inject-standards backend

backend:
  caching: Framework caching rules and entity cache patterns
  cdata-scripts: When to use CDATA blocks for Groovy scripts
  code-style: Code formatting and style guidelines
  command-files: Command file structure and delegation patterns
  data-files: Data file categories, naming, and load order
  demo-data-refresh: Demo data date refresh with relative date expressions
  data-types-custom: Custom data types for environment and load control
  datetime-handling: Date/time parsing, formatting, and arithmetic patterns
  eeca-patterns: Entity Event Condition Actions for data-level triggers
  email-notifications: EmailTemplate patterns and email ECA handling
  in-app-notifications: NotificationMessage API for in-app alerts and notification topics
  entities: Entity naming, relationships, and view patterns
  entity-filters: EntityFilter fail-safe patterns and context setup
  entity-indexes: Index naming and placement guidelines
  entity-queries: Entity query patterns and condition reference
  error-handling: Service errors, user messages, and transaction behavior
  field-types: Complete entity field type reference
  file-resources: Database resources, file storage, and content location patterns
  http-standards: HTTP status codes and date formats for APIs
  integration-patterns: External API calls, retry, timeout, and transaction isolation
  logging-audit: Structured logging, entity audit, and artifact tracking
  performance-optimization: Query tuning, select-field, for-update, and batch operations
  rest-api: REST API URL and response standards
  search-indexing: DataDocuments, DataFeeds, and OpenSearch integration
  seca-patterns: Service Event Condition Actions for workflow triggers
  security: Authentication, authorization, and row-level security
  security-review: Security review analytical checklist by dimension (EntityFilters, authz, auth, validation)
  service-composition: Service chaining and output handling patterns
  service-jobs: Job scheduling, cron patterns, and notifications
  service-parameters: Service parameter types, validation, and rules
  services: Service naming, definition, and configuration patterns
  status-workflow: Status types, items, and flow transitions for state machines
  xml-dsl-vs-script: When to use XML DSL vs inline/external scripts

frontend:
  dropdowns: Server-search rules and entity-options patterns
  form-widgets: Widget attributes (btn-type vs link-type)
  forms: Form types, limitations, and reserved names
  html-injection: Render-mode and raw HTML injection patterns
  rich-text-editor: WYSIWYG editor patterns, HTML sanitization, and PDF generation
  rendering-modes: URL prefixes (/qapps, /vapps, /apps) and SPA modes
  row-actions: Per-row data fetching in form-lists
  screen-reuse: Transition-include, section-include, form extends patterns
  screen-documents: In-app help documentation for screens (ScreenDocument entity, document/ directory)
  screens: Screen structure, containers, and form-list configuration
  subscreens: Auto-discovery rules and navigation patterns

global:
  build: Directory structure and Gradle configuration
  localization: English-first development and translation patterns
  tech-stack: Framework versions and dependencies
  xml-defaults: Default value omission rules
  xml-formatting: XML formatting, element ordering, and ID conventions

testing:
  message-clearing: Clearing execution context messages between tests
  spock-testing: Test structure, naming, pyramid ratios, and FIRST principles
